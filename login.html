<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Login — Tej Kumar Writings</title><link rel="stylesheet" href="style.css"><script defer src="script.js"></script></head><body>
<header class="site-header"><div class="container header-inner"><a class="brand" href="index.html"><img class="logo" src="assets/mr-romeo-cover.png" alt="logo"><div><h1>Tej Kumar Writings</h1></div></a></div></header>
<main class="container"><h2>Sign In</h2><div class="form-card"><label>Email</label><input type="email" id="email" placeholder="Enter email"><label>Password</label><input type="password" id="password" placeholder="Enter password"><button class="btn primary" id="loginBtn">Log in</button><p>New here? <a href="signup.html">Create an account</a></p></div></main>
<footer class="site-footer"><div class="container footer-inner">© <span id="year"></span> Tej Kumar Writings</div></footer>
<script>
document.getElementById('year').textContent = new Date().getFullYear();
const USER_KEY = 'tkw_users_v1';
document.getElementById('loginBtn').addEventListener('click',()=>{
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value.trim();
  const users = JSON.parse(localStorage.getItem(USER_KEY)||'[]');
  const user = users.find(u=>u.email===email && u.pass===pass);
  if(user){ sessionStorage.setItem('tkw_session_v1', JSON.stringify({email})); alert('Logged in'); window.location='library.html'; }
  else alert('Invalid credentials. If new, sign up.');
});
</script></body></html>
